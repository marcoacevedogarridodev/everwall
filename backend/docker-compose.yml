# backend/docker-compose.yml
version: '3.8'

services:
  backend:
    build: .
    container_name: everwall_backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./media:/app/media
      - ./static:/app/static
    environment:
      - DEBUG=True
      - DJANGO_SECRET_KEY=dev-secret-key-change-in-production
    restart: unless-stopped
